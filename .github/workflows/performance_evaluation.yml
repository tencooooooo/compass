name: Compass performance evaluation

on:
  schedule:
    # Weekly scorecard run. JST Monday 08:00 = UTC Sunday 23:00.
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compass-data-persistence
  cancel-in-progress: false

jobs:
  performance-evaluation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore performance memory
        uses: actions/cache@v4
        with:
          path: memory/performance/
          key: compass-performance-${{ github.run_id }}
          restore-keys: |
            compass-performance-

      - name: Restore persistent Compass data
        run: bash scripts/restore_persistent_data.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run API tests
        run: python -m unittest tests.api.test_api

      - name: Validate restored performance inputs
        run: python -m utils.operational_inputs performance

      - name: Generate performance scorecard
        run: python -m lab.performance.performance_engine

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-performance-evaluation
          path: |
            reports/performance/
            memory/performance/
          if-no-files-found: ignore

      - name: Persist memory and notifications
        if: always()
        run: bash scripts/persist_persistent_data.sh
