name: Compass knowledge graph

on:
  schedule:
    # Weekly graph refresh. JST Monday 09:00 = UTC Monday 00:00.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  knowledge-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore graph storage
        uses: actions/cache@v4
        with:
          path: storage/knowledge_graph/
          key: compass-knowledge-graph-${{ github.run_id }}
          restore-keys: |
            compass-knowledge-graph-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run API tests
        run: python -m unittest tests.api.test_api

      - name: Build knowledge graph
        run: python -m lab.knowledge_graph.graph_engine

      - name: Upload graph artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-knowledge-graph
          path: |
            storage/knowledge_graph/
            reports/graph/
          if-no-files-found: ignore
