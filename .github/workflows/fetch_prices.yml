name: Compass pipeline

on:
  schedule:
    # JST 07:00 = UTC 22:00. 米国市場の通常取引終了後に確認しやすい時間です。
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore notification history
        uses: actions/cache@v4
        with:
          path: storage/notifications/
          key: compass-notifications-${{ github.run_id }}
          restore-keys: |
            compass-notifications-

      - name: Restore memory layer
        uses: actions/cache@v4
        with:
          path: memory/
          key: compass-memory-${{ github.run_id }}
          restore-keys: |
            compass-memory-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: python tests/api/test_api.py

      - name: Fetch daily prices
        run: python collectors/prices/fetch_prices.py

      - name: Fetch company profiles
        run: python collectors/companies/fetch_company_profiles.py

      - name: Fetch financial data
        run: python collectors/financials/fetch_financials.py

      - name: Fetch news
        run: python collectors/news/fetch_news.py

      - name: Build event database
        run: python collectors/news/build_event_database.py

      - name: Generate company analysis reports
        run: python analyzers/company_analysis/generate_company_report.py

      - name: Generate comparative analysis reports
        run: python analyzers/comparative_analysis/generate_comparison_report.py

      - name: Generate explainable scoring reports
        run: python engines/scoring_engine/scoring_engine.py

      - name: Generate market intelligence reports
        run: python engines/market_intelligence/market_monitor.py

      - name: Generate discovery candidates
        run: python engines/discovery/discovery_engine.py

      - name: Generate validation reports
        run: python engines/validation/backtest_engine.py

      - name: Update memory layer
        run: python core/memory/memory_engine.py

      - name: Generate feedback reports
        run: python core/feedback/feedback_engine.py

      - name: Generate decision proposals
        run: python core/decision/decision_engine.py

      - name: Generate learning package
        run: python core/learning/learning_engine.py

      - name: Run notification engine
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMPASS_WORKFLOW_STATUS: ${{ job.status }}
          COMPASS_FAILED_STEP: Previous pipeline step
          COMPASS_ERROR: See GitHub Actions logs for details.
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python engines/notification/notification_engine.py

      - name: Send daily Slack report
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python integrations/slack/slack_notifier.py

      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-generated-outputs
          path: |
            storage/raw/
            storage/events/
            storage/notifications/
            memory/
            reports/
            logs/
          if-no-files-found: warn
