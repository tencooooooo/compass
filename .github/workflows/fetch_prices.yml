name: Compass pipeline

on:
  schedule:
    # JST 07:00 = UTC 22:00. 米国市場の通常取引終了後に確認しやすい時間です。
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compass-data-persistence
  cancel-in-progress: false

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore notification history
        uses: actions/cache@v4
        with:
          path: storage/notifications/
          key: compass-notifications-${{ github.run_id }}
          restore-keys: |
            compass-notifications-

      - name: Restore memory layer
        uses: actions/cache@v4
        with:
          path: memory/
          key: compass-memory-${{ github.run_id }}
          restore-keys: |
            compass-memory-

      - name: Restore persistent Compass data
        run: bash scripts/restore_persistent_data.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run API tests
        run: python -m unittest tests.api.test_api

      - name: Fetch daily prices
        run: python -m collectors.prices.fetch_prices

      - name: Fetch company profiles
        run: python -m collectors.companies.fetch_company_profiles

      - name: Fetch financial data
        run: python -m collectors.financials.fetch_financials

      - name: Enrich financials with SEC EDGAR quarterly data
        # SEC APIの一時障害で日次パイプライン全体を止めないため、失敗時はyfinance系列のまま継続します。
        continue-on-error: true
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python -m collectors.financials.fetch_sec_financials

      - name: Fetch news
        run: python -m collectors.news.fetch_news

      - name: Build event database
        run: python -m collectors.news.build_event_database

      - name: Evaluate data quality
        run: python -m foundation.data_quality.quality_engine

      - name: Generate company analysis reports
        run: python -m analyzers.company_analysis.generate_company_report

      - name: Generate comparative analysis reports
        run: python -m analyzers.comparative_analysis.generate_comparison_report

      - name: Generate explainable scoring reports
        run: python -m engines.scoring_engine.scoring_engine

      - name: Generate market intelligence reports
        run: python -m engines.market_intelligence.market_monitor

      - name: Generate discovery candidates
        run: python -m engines.discovery.discovery_engine

      - name: Generate validation reports
        run: python -m engines.validation.backtest_engine

      - name: Update memory layer
        run: python -m core.memory.memory_engine

      - name: Generate feedback reports
        run: python -m core.feedback.feedback_engine

      - name: Generate decision proposals
        run: python -m core.decision.decision_engine

      - name: Generate learning package
        run: python -m core.learning.learning_engine

      - name: Run notification engine
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMPASS_WORKFLOW_STATUS: ${{ job.status }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python -m engines.notification.notification_engine

      - name: Send daily Slack report
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python -m integrations.slack.slack_notifier

      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-generated-outputs
          path: |
            storage/raw/
            storage/events/
            storage/quality/
            storage/notifications/
            memory/
            reports/
            logs/
          if-no-files-found: warn

      - name: Persist memory and notifications
        if: always()
        run: bash scripts/persist_persistent_data.sh

  deploy-workspace:
    needs: fetch-prices
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated outputs
        uses: actions/download-artifact@v4
        with:
          name: compass-generated-outputs
          path: .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workspace/frontend/package-lock.json

      - name: Install workspace dependencies
        working-directory: workspace/frontend
        run: npm ci

      - name: Sync Compass data into workspace
        working-directory: workspace/frontend
        run: npm run sync-data

      - name: Build workspace
        working-directory: workspace/frontend
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: workspace/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
