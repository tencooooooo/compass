name: Compass strategy evaluation

on:
  schedule:
    # Weekly strategy simulation. JST Monday 09:00 = UTC Monday 00:00.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strategy-evaluation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore strategy memory
        uses: actions/cache@v4
        with:
          path: memory/strategy/
          key: compass-strategy-${{ github.run_id }}
          restore-keys: |
            compass-strategy-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: python tests/api/test_api.py

      - name: Generate strategy simulation reports
        run: python lab/strategy/strategy_engine.py

      - name: Upload strategy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-strategy-evaluation
          path: |
            reports/strategy/
            memory/strategy/
          if-no-files-found: ignore
