name: Compass strategy evaluation

on:
  schedule:
    # Weekly strategy simulation. JST Monday 09:00 = UTC Monday 00:00.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compass-data-persistence
  cancel-in-progress: false

jobs:
  strategy-evaluation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore strategy memory
        uses: actions/cache@v4
        with:
          path: memory/strategy/
          key: compass-strategy-${{ github.run_id }}
          restore-keys: |
            compass-strategy-

      - name: Restore persistent Compass data
        run: bash scripts/restore_persistent_data.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run API tests
        run: python -m unittest tests.api.test_api

      - name: Validate restored strategy inputs
        run: python -m utils.operational_inputs strategy

      - name: Refresh weekly pattern intelligence
        run: python -m lab.pattern_intelligence.pattern_engine

      - name: Refresh weekly theme intelligence
        run: python -m lab.theme_intelligence.theme_engine

      - name: Generate strategy simulation reports
        run: python -m lab.strategy.strategy_engine

      - name: Upload strategy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-strategy-evaluation
          path: |
            reports/strategy/
            memory/strategy/
          if-no-files-found: ignore

      - name: Persist memory and notifications
        if: always()
        run: bash scripts/persist_persistent_data.sh
