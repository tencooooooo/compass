name: Compass experiment evaluation

on:
  schedule:
    # Weekly experiment evaluation. JST Tuesday 09:00 = UTC Tuesday 00:00.
    - cron: "0 0 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compass-data-persistence
  cancel-in-progress: false

jobs:
  experiment-evaluation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore experiment registry
        uses: actions/cache@v4
        with:
          path: memory/experiments/
          key: compass-experiments-${{ github.run_id }}
          restore-keys: |
            compass-experiments-

      - name: Restore persistent Compass data
        run: bash scripts/restore_persistent_data.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run API tests
        run: python -m unittest tests.api.test_api

      - name: Validate restored experiment inputs
        run: python -m utils.operational_inputs experiment

      - name: Generate experiment reports
        run: python -m lab.experiments.experiment_engine

      - name: Upload experiment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-experiment-evaluation
          path: |
            reports/experiments/
            memory/experiments/
          if-no-files-found: ignore

      - name: Persist memory and notifications
        if: always()
        run: bash scripts/persist_persistent_data.sh
