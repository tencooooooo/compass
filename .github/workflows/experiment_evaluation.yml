name: Compass experiment evaluation

on:
  schedule:
    # Weekly experiment evaluation. JST Tuesday 09:00 = UTC Tuesday 00:00.
    - cron: "0 0 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  experiment-evaluation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore experiment registry
        uses: actions/cache@v4
        with:
          path: memory/experiments/
          key: compass-experiments-${{ github.run_id }}
          restore-keys: |
            compass-experiments-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: python tests/api/test_api.py

      - name: Generate experiment reports
        run: python lab/experiments/experiment_engine.py

      - name: Upload experiment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compass-experiment-evaluation
          path: |
            reports/experiments/
            memory/experiments/
          if-no-files-found: ignore
