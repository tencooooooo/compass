datasources:
  yahoo_finance:
    enabled: true

  sec:
    enabled: true
    forms:
      - 10-K
      - 10-Q
      - 8-K
    limit: 1
    request_interval: 0.2
    max_retries: 3
    user_agent_env: SEC_USER_AGENT

  earnings:
    enabled: true
    source_type: local
    source_directory: storage/raw/earnings_sources
    user_agent_env: EARNINGS_USER_AGENT

  fred:
    enabled: false
    api_key_env: FRED_API_KEY

  finnhub:
    enabled: false
    api_key_env: FINNHUB_API_KEY

  alpha_vantage:
    enabled: false
    api_key_env: ALPHA_VANTAGE_API_KEY

  csv:
    enabled: true

  pdf:
    enabled: false

  json:
    enabled: true
